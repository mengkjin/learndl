# basic verbosity settings
basic:
  vb: 3
  vb_max: 10
  vb_min: 0
  vb_never: 99
  vb_always: -99
  vb_level_callback: 99 # to show all callback messages, set to values less than vb_inf

# special verbosity settings for special purposes , use Proj.vb.get('key') to get the verbosity
special:
  callback: 
    default: max
    debug: always
  proxy:
    default: max
    debug: always
  crawler:
    default: max
    debug: always