model:
  # main model configs ----------------------------------------------------------------
  module        : lgbm  # any of [nn defined in src/algo/nn/api.py] or ['boost' , 'lgbm' , 'ada' , 'xgboost' , 'catboost']
  submodels     : [best] # subset of ['best' , 'swalast' , 'swabest'] , but for boost , only use best
  
  module.boost.optuna: True

  window  : 480
  # labels specification ------------------------------------------------------------
  # rtn : raw return | std : standardized return | res : risk model residual
  # if module is nn , use multiloss combination of the labels
  # if module is boost , only use the first label
  labels: 
    - std_lag1_10 # any of [res_lag1_10, res_lag1_20, rtn_lag1_10, rtn_lag1_20, std_lag1_10, std_lag1_20]

input:
  # input specification ----------------------------------------------------------------
  type: hidden # [data , hidden , factor] , specify below

  hidden.types: # list of hidden states , use if input_type is hidden
    - gru@gru_day_new@0@best
    - resnet_gru@gru_30m_new@0@best
    - resnet_gru@gru_week_new@0@best
    - gru@gru_dfl2_new@0@best
    - gru@gru_dfl2cs_new@0@best

train:
  criterion.boost:
    objective: mse # null , mse , mae , rank

algo:
  lgbm:
    seqlens:        [{day: 1}]
