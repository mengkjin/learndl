input.data.types: day
input.hidden.types:
  - gru_day_V0.0.best
  - gru_day_V0.1.best
input.factor.types:
  fundament: [quality]
input.combo.types: [data , factor]
input.sequence.lens: {day: 30, style: 30, indus: 30 , factor: 1, hidden: 1 , 'week' : 50} 
