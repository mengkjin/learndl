  hidden_corr: {'alpha' : 0.0}
  hidden_corr_deprecated: {'alpha' : 0.001}
train.criterion.accuracy:
  spearman: {which_output: [0] , which_label: [0]}
train.criterion.weight: {'fit' : 'equal' , 'test' : 'equal'}
train.criterion.multilosses:
  name: hybrid
  params:
    hybrid: {'phi' : null , 'tau' : 2}
    dwa: {'tau' : 2}
    ruw: {'phi' : null}
    ewa: {}
    gls: {}
    rws: {}
train.criterion.boost:
  objective: null # 'mse' ,'mae' , 'rank'
  n_bins: null # positive integer value
  rank_target_size: null

train.torch_compile: false
train.torch_compile.mode: default
train.torch_compile.fullgraph: false
train.torch_compile.stage: fit

callbacks.LearnRateReset: {'num_reset' : 2 , 'trigger' : 40 , 'recover_level' : 1.0 , 'speedup2x' : true}
callbacks.CallbackTimer: {}
callbacks.EarlyStoppage: {'peak_patience' : 20 , 'converge_patience' : 5 , 'converge_dataset' : 'valid'}
