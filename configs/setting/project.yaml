debug_mode: false # if true, will enable some debug mode features e.g. record param/grad histogram in tensorboard
show_vb_level: false # if true, all Logger export will be prefixed vb_level of the line

# verbosity settings
vb:  3
vb_max: 10
vb_min: 0
vb_never: 99
vb_always: -99
vb_level_callback: 99 # to show all callback messages, set to values less than vb_inf